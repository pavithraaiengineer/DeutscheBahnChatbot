<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DeBian — DB Train Booking Assistant</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.11.0/dist/tabler-icons.min.css" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --teal: #1D9E75; --teal-dark: #0F6E56; --teal-light: #E1F5EE; --teal-mid: #9FE1CB;
  --bg: #f4f6f5; --surface: #ffffff; --border: #e0e8e4;
  --text: #1a1f1c; --muted: #6b7b72; --danger: #E24B4A;
  --radius-sm: 6px; --radius-md: 8px; --radius-lg: 12px; --radius-xl: 16px;
  --font: 'DM Sans', sans-serif; --mono: 'DM Mono', monospace;
  --shadow-sm: 0 1px 4px rgba(0,0,0,.06);
  --chat-w: 360px;
}
body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; display: flex; overflow: hidden; }

/* ── LAYOUT ─────────────────────────────────────────────────── */
#booking-pane {
  flex: 1; overflow-y: auto; padding: 2rem 1.5rem;
  display: flex; flex-direction: column; align-items: center;
}
#chat-pane {
  width: var(--chat-w); flex-shrink: 0;
  border-left: 0.5px solid var(--border);
  background: var(--surface);
  display: flex; flex-direction: column;
  position: relative;
}

/* ── BOOKING ─────────────────────────────────────────────────── */
#booking-inner { width: 100%; max-width: 600px; }
.bk-header {
  display: flex; align-items: center; gap: 12px; margin-bottom: 2rem;
}
.bk-logo {
  width: 40px; height: 40px; border-radius: var(--radius-md);
  background: var(--teal); display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 20px;
}
.bk-title { font-size: 20px; font-weight: 500; }
.bk-subtitle { font-size: 13px; color: var(--muted); margin-top: 2px; }

input, select {
  width: 100%; padding: 10px 12px;
  border: 0.5px solid var(--border); border-radius: var(--radius-md);
  font-size: 14px; font-family: var(--font);
  background: var(--surface); color: var(--text); outline: none;
  transition: border-color .15s;
}
input:focus, select:focus { border-color: var(--teal); box-shadow: 0 0 0 3px rgba(29,158,117,.1); }
.field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; margin-bottom: 1rem; }
.field-group label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 4px; letter-spacing: .02em; }
@media (max-width: 520px) { .field-grid { grid-template-columns: 1fr; } #chat-pane { display: none; } }

.card {
  background: var(--surface); border: 0.5px solid var(--border);
  border-radius: var(--radius-lg); padding: 1rem 1.25rem;
  cursor: pointer; margin-bottom: .65rem;
  display: flex; align-items: center; justify-content: space-between;
  transition: border-color .15s, background .15s, transform .1s;
  box-shadow: var(--shadow-sm);
}
.card:hover { border-color: var(--teal-mid); transform: translateY(-1px); }
.card.selected { border: 2px solid var(--teal); background: var(--teal-light); }

.badge {
  font-size: 11.5px; padding: 3px 10px; border-radius: 20px;
  background: #f0f2f1; color: var(--muted); display: inline-block; font-family: var(--mono);
}
.badge.best { background: var(--teal-light); color: var(--teal-dark); font-weight: 500; }

.btn-primary {
  width: 100%; padding: .875rem; border-radius: var(--radius-lg);
  background: var(--teal); color: #fff; border: none;
  font-size: 15px; font-weight: 500; font-family: var(--font);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  gap: .5rem; transition: background .15s, transform .1s;
}
.btn-primary:hover { background: var(--teal-dark); }
.btn-primary:active { transform: scale(.98); }
.btn-ghost {
  padding: .875rem; border-radius: var(--radius-lg);
  background: transparent; color: var(--text); border: 0.5px solid var(--border);
  font-size: 15px; font-family: var(--font); cursor: pointer; transition: background .15s;
}
.btn-ghost:hover { background: #f0f2f1; }

.row-pair { display: flex; justify-content: space-between; font-size: 13.5px; margin-bottom: .5rem; }
.row-pair span:first-child { color: var(--muted); }
.row-pair span:last-child { text-align: right; max-width: 60%; font-weight: 400; }
.summary-box {
  border: 0.5px solid var(--border); border-radius: var(--radius-lg);
  padding: 1.25rem; background: #f9faf9;
}
.section-label { font-size: 10.5px; letter-spacing: .1em; color: var(--muted); text-transform: uppercase; margin-bottom: .85rem; font-weight: 500; }
.error-msg { color: var(--danger); font-size: 13px; margin-top: .5rem; min-height: 18px; }

/* stepper */
.step-dot {
  width: 30px; height: 30px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 500; flex-shrink: 0; transition: background .2s;
}
.step-line { flex: 1; height: 1px; margin: 0 4px; transition: background .2s; }

/* ── CHAT PANE ──────────────────────────────────────────────── */
.chat-header {
  padding: 1rem 1.25rem; border-bottom: 0.5px solid var(--border);
  display: flex; align-items: center; gap: 10px; flex-shrink: 0;
}
.agent-avatar {
  width: 34px; height: 34px; border-radius: 50%;
  background: var(--teal); color: #fff;
  display: flex; align-items: center; justify-content: center; font-size: 16px;
}
.agent-name { font-size: 14px; font-weight: 500; }
.agent-status { font-size: 11px; color: var(--teal); display: flex; align-items: center; gap: 4px; }
.status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--teal); }

#chat-messages {
  flex: 1; overflow-y: auto; padding: 1rem;
  display: flex; flex-direction: column; gap: .6rem;
  scroll-behavior: smooth;
}
.msg {
  max-width: 88%; padding: .6rem .85rem;
  border-radius: var(--radius-lg); font-size: 13.5px; line-height: 1.5;
  animation: fadeUp .2s ease;
}
@keyframes fadeUp { from { opacity:0; transform: translateY(6px); } to { opacity:1; transform: none; } }
.msg.user {
  align-self: flex-end;
  background: var(--teal); color: #fff;
  border-bottom-right-radius: var(--radius-sm);
}
.msg.agent {
  align-self: flex-start;
  background: #f0f4f2; color: var(--text);
  border-bottom-left-radius: var(--radius-sm);
}
.msg.agent.thinking {
  color: var(--muted); font-style: italic;
}
.msg-time { font-size: 10px; color: var(--muted); margin-top: 3px; text-align: right; }

.quick-btns { padding: .5rem 1rem; display: flex; flex-wrap: wrap; gap: .4rem; flex-shrink: 0; }
.quick-btn {
  font-size: 12px; padding: 5px 10px; border-radius: 20px;
  border: 0.5px solid var(--border); background: var(--surface);
  cursor: pointer; color: var(--muted); font-family: var(--font);
  transition: border-color .15s, color .15s, background .15s;
}
.quick-btn:hover { border-color: var(--teal); color: var(--teal); background: var(--teal-light); }

.chat-input-row {
  padding: .75rem 1rem; border-top: 0.5px solid var(--border);
  display: flex; gap: .5rem; flex-shrink: 0;
}
#chat-input {
  flex: 1; resize: none; min-height: 38px; max-height: 100px;
  padding: 8px 12px; border-radius: var(--radius-md);
  font-size: 13.5px; font-family: var(--font); line-height: 1.4;
  border: 0.5px solid var(--border); outline: none; overflow-y: auto;
}
#chat-input:focus { border-color: var(--teal); box-shadow: 0 0 0 2px rgba(29,158,117,.1); }
#send-btn {
  width: 36px; height: 36px; border-radius: var(--radius-md);
  background: var(--teal); color: #fff; border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: background .15s; align-self: flex-end;
}
#send-btn:hover { background: var(--teal-dark); }

/* Confirmation screen */
.success-icon {
  width: 56px; height: 56px; border-radius: 50%;
  background: var(--teal-light);
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 1rem; font-size: 26px; color: var(--teal);
}
</style>
</head>
<body>

<!-- ── LEFT: BOOKING UI ─────────────────────────────────────── -->
<div id="booking-pane">
  <div id="booking-inner">
    <div class="bk-header">
      <div class="bk-logo"><i class="ti ti-train"></i></div>
      <div>
        <div class="bk-title">DB Train Booking</div>
        <div class="bk-subtitle">Frankfurt(Main)Hbf → Berlin Hbf</div>
      </div>
    </div>
    <div id="app"></div>
  </div>
</div>

<!-- ── RIGHT: DEBIAN CHAT ───────────────────────────────────── -->
<div id="chat-pane">
  <div class="chat-header">
    <div class="agent-avatar"><i class="ti ti-robot"></i></div>
    <div>
      <div class="agent-name">DeBian</div>
      <div class="agent-status"><span class="status-dot"></span>Online · Rail Assistant</div>
    </div>
  </div>

  <div id="chat-messages"></div>

  <div class="quick-btns" id="quick-btns">
    <button class="quick-btn" onclick="quickSend('What\'s the best value train?')">Best value?</button>
    <button class="quick-btn" onclick="quickSend('What\'s the difference between ticket types?')">Ticket types</button>
    <button class="quick-btn" onclick="quickSend('Is the ICE 572 the fastest option?')">Fastest train?</button>
    <button class="quick-btn" onclick="quickSend('I have a BahnCard 50, what should I pick?')">BahnCard 50</button>
  </div>

  <div class="chat-input-row">
    <textarea id="chat-input" placeholder="Ask DeBian anything about your trip…" rows="1"></textarea>
    <button id="send-btn" onclick="sendChat()" title="Send"><i class="ti ti-send"></i></button>
  </div>
</div>

<script>
/* ════════════════════════════════════════════════════════════
   BOOKING STATE & DATA
════════════════════════════════════════════════════════════ */
const TRAINS = [
  { id:'ice572', name:'ICE 572', dep:'11:52', arr:'13:52', dur:'2h',   badge:'Fastest',    best:false, prices:{standard:189,   sparpreis:167,    bc50:157}    },
  { id:'ic2123', name:'IC 2123', dep:'12:52', arr:'15:52', dur:'3h',   badge:'3h journey', best:false, prices:{standard:149,   sparpreis:131,    bc50:123.67} },
  { id:'re1',    name:'RE 1',    dep:'13:52', arr:'17:52', dur:'4h',   badge:'Best price', best:true,  prices:{standard:49.90, sparpreis:49.90,  bc50:49.90}  },
];
const TICKETS = [
  { id:'standard',  label:'Standard',       desc:'Fully flexible, refundable anytime' },
  { id:'sparpreis', label:'Sparpreis',       desc:'Save more — non-refundable, book early' },
  { id:'bc50',      label:'BC50 Sparpreis',  desc:'BahnCard 50 required — best available price' },
];

let S = { step:1, train:'re1', ticket:'standard', first:'', last:'', email:'', dob:'' };
const el = id => document.getElementById(id);
const fmt = n => '€' + n.toFixed(2);
const getPrice = () => TRAINS.find(t => t.id === S.train).prices[S.ticket];

/* ── STEPPER ────────────────────────────────────────────── */
function dot(n) {
  const done = n < S.step, active = n === S.step;
  const bg  = (done||active) ? 'var(--teal)' : '#f0f2f1';
  const col = (done||active) ? '#fff' : 'var(--muted)';
  const brd = (done||active) ? 'none' : '0.5px solid #cdd5d0';
  return `<div class="step-dot" style="background:${bg};border:${brd};color:${col};">${done?'<i class="ti ti-check" style="font-size:13px"></i>':n}</div>`;
}
function line(done) {
  return `<div class="step-line" style="background:${done?'var(--teal)':'var(--border)'};"></div>`;
}
function stepper() {
  return `<div style="display:flex;align-items:center;margin-bottom:1.75rem;">${dot(1)}${line(S.step>1)}${dot(2)}${line(S.step>2)}${dot(3)}${line(S.step>3)}${dot(4)}</div>`;
}

/* ── CARDS ──────────────────────────────────────────────── */
function trainCard(t) {
  const sel = S.train === t.id;
  return `<div class="card${sel?' selected':''}" onclick="selTrain('${t.id}')">
    <div>
      <div style="font-size:17px;font-weight:500;margin-bottom:3px;">${t.dep} → ${t.arr}</div>
      <div style="font-size:12.5px;color:var(--muted);margin-bottom:6px;font-family:var(--mono);">${t.name}</div>
      <span class="badge${t.best?' best':''}">${t.best?'★ ':''}${t.badge} · ${t.dur}</span>
    </div>
    <div style="text-align:right;">
      <div style="font-size:11px;color:var(--muted);margin-bottom:4px;">● Direct</div>
      <div style="font-size:${t.best?'20px':'17px'};font-weight:500;color:${t.best?'var(--teal)':'var(--text)'};">${fmt(t.prices[S.ticket])}</div>
    </div>
  </div>`;
}

function ticketCard(tk) {
  const sel = S.ticket === tk.id;
  const p = TRAINS.find(t => t.id === S.train).prices[tk.id];
  return `<div class="card${sel?' selected':''}" onclick="selTicket('${tk.id}')">
    <div>
      <div style="font-size:15px;font-weight:500;margin-bottom:3px;">${tk.label}</div>
      <div style="font-size:12.5px;color:var(--muted);">${tk.desc}</div>
    </div>
    <div style="font-size:17px;font-weight:500;">${fmt(p)}</div>
  </div>`;
}

function summaryBox() {
  const t  = TRAINS.find(t => t.id === S.train);
  const tk = TICKETS.find(tk => tk.id === S.ticket);
  return `<div class="summary-box">
    <div class="section-label">Booking summary</div>
    <div class="row-pair"><span>Route</span><span>Frankfurt(Main)Hbf → Berlin Hbf</span></div>
    <div class="row-pair"><span>Train</span><span>${t.name} (Direct)</span></div>
    <div class="row-pair"><span>Departure</span><span>${t.dep} → ${t.arr}</span></div>
    <div class="row-pair"><span>Ticket type</span><span>${tk.label}</span></div>
    <div style="border-top:0.5px solid var(--border);margin-top:.75rem;padding-top:.75rem;display:flex;justify-content:space-between;">
      <span style="font-weight:500;">Total</span>
      <span style="font-size:18px;font-weight:500;">${fmt(getPrice())}</span>
    </div>
  </div>`;
}

function cheapestLine() {
  const min = Math.min(...TRAINS.map(t => t.prices[S.ticket]));
  const tk = TICKETS.find(tk => tk.id === S.ticket);
  return `<div style="font-size:12.5px;color:var(--muted);margin-bottom:1.25rem;">All connections · Cheapest: <span style="color:var(--teal);font-weight:500;">${tk.label} ${fmt(min)}</span></div>`;
}

/* ── STEPS ──────────────────────────────────────────────── */
function step1() {
  return stepper() + `
    <div style="margin-bottom:1.25rem;">
      <div class="section-label">Available connections</div>
      <div style="font-size:19px;font-weight:500;">Frankfurt(Main)Hbf → Berlin Hbf</div>
    </div>
    ${cheapestLine()}
    ${TRAINS.map(trainCard).join('')}
    <button class="btn-primary" onclick="next()" style="margin-top:1rem;">Select train &amp; continue <i class="ti ti-arrow-right"></i></button>`;
}

function step2() {
  const t = TRAINS.find(t => t.id === S.train);
  return stepper() + `
    <div style="margin-bottom:1.25rem;">
      <div class="section-label">Choose your ticket</div>
      <div style="font-size:19px;font-weight:500;">Ticket type for ${t.name}</div>
    </div>
    ${TICKETS.map(ticketCard).join('')}
    <div style="display:flex;gap:.75rem;margin-top:1rem;">
      <button class="btn-ghost" onclick="prev()" style="flex:1;">← Back</button>
      <button class="btn-primary" onclick="next()" style="flex:2;">Continue →</button>
    </div>`;
}

function step3() {
  return stepper() + `
    <div style="margin-bottom:1.25rem;">
      <div class="section-label">Step 3 of 4</div>
      <div style="font-size:19px;font-weight:500;">Passenger details</div>
    </div>
    <div class="field-grid">
      <div class="field-group"><label>First name</label><input type="text" placeholder="e.g. Anna" value="${S.first}" oninput="S.first=this.value" /></div>
      <div class="field-group"><label>Last name</label><input type="text" placeholder="e.g. Müller" value="${S.last}" oninput="S.last=this.value" /></div>
      <div class="field-group"><label>Email</label><input type="email" placeholder="anna@example.com" value="${S.email}" oninput="S.email=this.value" /></div>
      <div class="field-group"><label>Date of birth</label><input type="date" value="${S.dob}" oninput="S.dob=this.value" /></div>
    </div>
    ${summaryBox()}
    <div class="error-msg" id="err"></div>
    <div style="display:flex;gap:.75rem;margin-top:1rem;">
      <button class="btn-ghost" onclick="prev()" style="flex:1;">← Back</button>
      <button class="btn-primary" onclick="confirmBooking()" style="flex:2;"><i class="ti ti-check"></i> Confirm booking</button>
    </div>`;
}

function step4() {
  const ref = 'DB' + Math.random().toString(36).slice(2,10).toUpperCase();
  window._ref = ref;
  window._bookingConfirmed = true;
  // Notify DeBian about the confirmation
  setTimeout(() => agentNotifyConfirmed(ref), 400);
  return stepper() + `
    <div style="text-align:center;padding:2rem 1rem 1.5rem;">
      <div class="success-icon"><i class="ti ti-check"></i></div>
      <div style="font-size:22px;font-weight:500;margin-bottom:.5rem;">Booking confirmed!</div>
      <div style="font-size:13.5px;color:var(--muted);">Reference: <strong style="font-family:var(--mono);">${ref}</strong></div>
    </div>
    ${summaryBox()}
    <div style="margin-top:.75rem;text-align:center;font-size:13px;color:var(--muted);">Confirmation sent to <strong>${S.email}</strong></div>
    <button class="btn-primary" onclick="dlPDF('${ref}')" style="margin-top:1rem;">
      <i class="ti ti-download"></i> Download ticket PDF
    </button>
    <button class="btn-ghost" onclick="resetBooking()" style="width:100%;margin-top:.75rem;">Book another ticket</button>`;
}

function render() {
  el('app').innerHTML = [null, step1, step2, step3, step4][S.step]();
}

function selTrain(id) { S.train = id; render(); agentOnTrainSelect(id); }
function selTicket(id) { S.ticket = id; render(); }
function next() { S.step++; render(); }
function prev() { S.step--; render(); }
function resetBooking() {
  S = { step:1, train:'re1', ticket:'standard', first:'', last:'', email:'', dob:'' };
  window._bookingConfirmed = false;
  render();
}
function confirmBooking() {
  if (!S.first||!S.last||!S.email||!S.dob) { el('err').textContent='Please fill in all fields.'; return; }
  if (!S.email.includes('@')) { el('err').textContent='Please enter a valid email address.'; return; }
  S.step = 4; render();
}

/* ── PDF GENERATION ─────────────────────────────────────── */
function dlPDF(ref) {
  if (!window.jspdf) { alert('PDF library is still loading — please try again in a moment.'); return; }
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation:'portrait', unit:'mm', format:'a4' });
  const W = doc.internal.pageSize.getWidth();
  const t  = TRAINS.find(t  => t.id  === S.train);
  const tk = TICKETS.find(tk => tk.id === S.ticket);
  const p  = getPrice();

  doc.setFillColor(240,247,244); doc.rect(0,0,W,297,'F');
  doc.setFillColor(29,158,117); doc.rect(0,0,W,48,'F');
  doc.setTextColor(255,255,255);
  doc.setFontSize(24); doc.setFont('helvetica','bold');
  doc.text('TRAIN TICKET', 20, 22);
  doc.setFontSize(11); doc.setFont('helvetica','normal');
  doc.text('Deutsche Bahn · Electronic Ticket', 20, 31);
  doc.text('Booking Reference: ' + ref, 20, 40);

  doc.setFillColor(255,255,255); doc.roundedRect(15,57,W-30,38,4,4,'F');
  doc.setFontSize(9); doc.setFont('helvetica','normal'); doc.setTextColor(130,130,130);
  doc.text('FROM', 25, 68); doc.text('TO', W/2+5, 68);
  doc.setFontSize(16); doc.setFont('helvetica','bold'); doc.setTextColor(25,25,25);
  doc.text('Frankfurt(Main)Hbf', 25, 78);
  doc.text('Berlin Hbf', W/2+5, 78);
  doc.setFontSize(11); doc.setFont('helvetica','normal'); doc.setTextColor(29,158,117);
  doc.text('→ Direct service · ' + t.dur, 25, 88);

  doc.setFillColor(255,255,255); doc.roundedRect(15,104,W-30,75,4,4,'F');
  const F = (lbl,val,x,y) => {
    doc.setFontSize(8); doc.setFont('helvetica','normal'); doc.setTextColor(130,130,130);
    doc.text(lbl.toUpperCase(), x, y);
    doc.setFontSize(12); doc.setFont('helvetica','bold'); doc.setTextColor(25,25,25);
    doc.text(val, x, y+7);
  };
  F('Train',       t.name,             25,      116);
  F('Departure',   t.dep + ' → ' + t.arr, 25,   133);
  F('Duration',    t.dur,              25,      150);
  F('Ticket type', tk.label,           W/2+5,   116);
  F('Passenger',   S.first + ' ' + S.last, W/2+5, 133);
  F('Date of birth', S.dob,            W/2+5,   150);

  doc.setFillColor(29,158,117); doc.roundedRect(15,188,W-30,22,4,4,'F');
  doc.setFontSize(11); doc.setFont('helvetica','normal'); doc.setTextColor(255,255,255);
  doc.text('Total amount paid', 25, 202);
  doc.setFontSize(18); doc.setFont('helvetica','bold');
  doc.text(fmt(p), W-20, 202, { align:'right' });

  doc.setFillColor(25,25,25); doc.roundedRect(15,219,W-30,22,3,3,'F');
  doc.setFillColor(255,255,255);
  let bx = 25;
  const bars = [2,1,3,1,2,3,1,2,1,3,2,1,3,1,2,1,3,2,1,3,1,2,3,1,2,1,3];
  for(const b of bars){ doc.rect(bx,222,1,12,'F'); bx += b+1; if(bx > W-25) break; }
  doc.setFontSize(7); doc.setTextColor(180,180,180); doc.setFont('helvetica','normal');
  doc.text(ref + ' | ' + t.dep + ' Frankfurt(Main)Hbf → Berlin Hbf', W/2, 239, { align:'center' });

  doc.setFontSize(9); doc.setTextColor(100,100,100);
  doc.text('Please present this ticket to the conductor when requested.', W/2, 257, { align:'center' });
  doc.text('Generated ' + new Date().toLocaleDateString('de-DE') + ' · DB Booking System', W/2, 264, { align:'center' });

  doc.save('DB-Ticket-' + ref + '.pdf');
}

/* ════════════════════════════════════════════════════════════
   CHAT / DEBIAN AGENT (Claude API)
════════════════════════════════════════════════════════════ */
let chatHistory = [];

function nowTime() {
  return new Date().toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });
}

function appendMsg(role, text, thinking=false) {
  const wrap = el('chat-messages');
  const div = document.createElement('div');
  div.className = `msg ${role}${thinking ? ' thinking' : ''}`;
  div.innerHTML = text.replace(/\n/g, '<br>') + `<div class="msg-time">${nowTime()}</div>`;
  wrap.appendChild(div);
  wrap.scrollTop = wrap.scrollHeight;
  return div;
}

function removeMsg(div) { div && div.remove(); }

/* Build context string from current booking state */
function bookingContext() {
  const t  = TRAINS.find(t  => t.id  === S.train);
  const tk = TICKETS.find(tk => tk.id === S.ticket);
  return `Current booking state:
- Step: ${S.step} of 4
- Route: Frankfurt(Main)Hbf → Berlin Hbf
- Selected train: ${t.name} (${t.dep}→${t.arr}, ${t.dur})
- Ticket type: ${tk.label}
- Price: ${fmt(getPrice())}
- Available trains: ICE 572 (€${TRAINS[0].prices[S.ticket]}), IC 2123 (€${TRAINS[1].prices[S.ticket]}), RE 1 (€${TRAINS[2].prices[S.ticket]} — cheapest)
${S.first ? `- Passenger: ${S.first} ${S.last}` : ''}
${window._bookingConfirmed ? `- BOOKING CONFIRMED, ref: ${window._ref}` : ''}`;
}

async function callDeBian(userMessage) {
  const systemPrompt = `You are DeBian, a friendly and knowledgeable Deutsche Bahn digital rail assistant helping a customer book a train ticket from Frankfurt(Main)Hbf to Berlin Hbf.

You help customers:
- Choose the best train connection for their needs
- Understand ticket types (Standard, Sparpreis, BC50 Sparpreis)
- Complete the booking process step by step
- Understand pricing and BahnCard benefits
- Download their ticket PDF after confirmation

Keep responses concise (2–4 sentences max unless explaining something complex). Be warm and helpful. Use € for prices. When the user confirms a booking, congratulate them warmly and remind them to download the PDF ticket. Never make up train numbers or prices beyond what's in the booking context.`;

  const contextMsg = bookingContext();
  const messages = [
    ...chatHistory,
    { role: 'user', content: `[Booking context]\n${contextMsg}\n\n[User message]\n${userMessage}` }
  ];

  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      system: systemPrompt,
      messages,
    }),
  });

  const data = await resp.json();
  const text = (data.content || []).map(b => b.text || '').join('');
  return text || 'I\'m sorry, I couldn\'t process that. Please try again.';
}

async function sendChat() {
  const inp = el('chat-input');
  const msg = inp.value.trim();
  if (!msg) return;

  inp.value = '';
  inp.style.height = 'auto';

  appendMsg('user', msg);
  chatHistory.push({ role: 'user', content: msg });

  const thinking = appendMsg('agent', 'Thinking…', true);

  try {
    const reply = await callDeBian(msg);
    removeMsg(thinking);
    appendMsg('agent', reply);
    chatHistory.push({ role: 'assistant', content: reply });
    if (chatHistory.length > 20) chatHistory = chatHistory.slice(-20);
  } catch(err) {
    removeMsg(thinking);
    appendMsg('agent', 'Sorry, I\'m having trouble connecting right now. Please try again in a moment.');
  }
}

function quickSend(text) {
  el('chat-input').value = text;
  sendChat();
}

/* ── AUTO-TRIGGER: train selection → DeBian comment ─── */
async function agentOnTrainSelect(trainId) {
  const t = TRAINS.find(t => t.id === trainId);
  if (!t) return;
  const prompt = `The customer just selected ${t.name} (${t.dep}→${t.arr}, ${t.dur}, ${fmt(t.prices[S.ticket])}). Give a brief one-sentence helpful comment about this choice.`;

  const thinking = appendMsg('agent', '…', true);
  try {
    const reply = await callDeBian(prompt);
    removeMsg(thinking);
    appendMsg('agent', reply);
    chatHistory.push({ role: 'assistant', content: reply });
  } catch { removeMsg(thinking); }
}

/* ── AUTO-TRIGGER: booking confirmed ────────────────── */
async function agentNotifyConfirmed(ref) {
  const t  = TRAINS.find(t  => t.id  === S.train);
  const prompt = `The customer just confirmed their booking! Reference: ${ref}. Train: ${t.name}, ${t.dep}→${t.arr}. Congratulate them warmly and remind them to download the PDF ticket using the button below the booking summary.`;

  const thinking = appendMsg('agent', '…', true);
  try {
    const reply = await callDeBian(prompt);
    removeMsg(thinking);
    appendMsg('agent', reply);
    chatHistory.push({ role: 'assistant', content: reply });
  } catch { removeMsg(thinking); }
}

/* ── ENTER to send ──────────────────────────────────── */
el('chat-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }
});

/* ── Auto-resize textarea ───────────────────────────── */
el('chat-input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
});

render();

}, 300);
</script>
